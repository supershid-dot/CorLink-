<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="CorLink — Correctional Liaison &amp; Correspondence System. Secure, structured, accountable communications for the Maldives Correctional Service." />

  <title>CorLink — Secure. Structured. Accountable.</title>

  <!-- Content Security Policy — GitHub Pages serves static files only and
       cannot set HTTP headers, so this meta tag is the enforcement point.
       Restricts script/style/connect sources to only what CorLink needs:
       self, Google Fonts, jsDelivr (Supabase JS + Tabler Icons), and the
       Supabase project itself (REST + Realtime WebSocket).
       connect-src/img-src are pinned to THIS project's own subdomain
       (infjjroktzzhaxjvfknr.supabase.co, matching SUPABASE_URL in
       js/config.js) rather than the broader https://*.supabase.co
       wildcard — if a stored-XSS payload ever ran despite the rest of
       this app's sanitization, the wildcard would let it exfiltrate
       data to ANY Supabase project, not just this one. If you deploy
       to a different Supabase project, update the ref here to match. -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' https://cdn.jsdelivr.net;
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net;
    font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net;
    img-src 'self' data: https://infjjroktzzhaxjvfknr.supabase.co;
    connect-src 'self' https://infjjroktzzhaxjvfknr.supabase.co wss://infjjroktzzhaxjvfknr.supabase.co;
    object-src 'none';
    base-uri 'self';
    frame-ancestors 'none';
  " />

  <!-- Favicon (official CorLink logo) -->
  <link rel="icon" type="image/jpeg" href="assets/logo.jpg" />

  <!-- Inter font (Google Fonts) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Tabler Icons — version pinned to avoid a jsDelivr resolution
       round-trip on every cold visit (which showed as a stuck loading
       screen on first load until the browser cached the redirect). -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.44.0/dist/tabler-icons.min.css" />

  <!-- CorLink styles — every local (non-CDN) <link>/<script> tag below
       carries a "?v=YYYYMMDD" cache-buster. GitHub Pages doesn't send
       aggressive cache headers, but mobile browsers will still happily
       serve a stale style.css/*.js from disk cache for a long time
       once they've fetched it once, especially on flaky connections —
       users have repeatedly seen an old UI ("counts/text missing")
       days after a real fix already shipped, purely from this.
       BUMP THIS DATE (all instances — see the sed one-liner below)
       whenever you push a CSS/JS change and want it guaranteed to
       reach every open tab on the next reload:
         sed -i 's/?v=[0-9]\{8\}/?v=YYYYMMDD/g' index.html -->
  <link rel="stylesheet" href="css/style.css?v=20260715" />
</head>
<body>
  <!-- SPA container — all views are rendered here by JavaScript -->
  <div id="app" role="main">
    <!-- Loading state shown until JS boots -->
    <div style="
      min-height:100vh; display:flex; align-items:center; justify-content:center;
      background:linear-gradient(135deg,#0D9488,#334155);
    ">
      <div style="text-align:center; color:rgba(255,255,255,.85);">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"
          width="56" height="56" style="margin:0 auto 16px;">
          <path d="M32 4L8 14v18c0 14 10.5 24.5 24 28 13.5-3.5 24-14 24-28V14L32 4z"
            fill="rgba(255,255,255,.15)" stroke="rgba(255,255,255,.7)" stroke-width="2"/>
          <circle cx="24" cy="30" r="5" fill="none" stroke="rgba(255,255,255,.8)" stroke-width="2"/>
          <circle cx="40" cy="30" r="5" fill="none" stroke="rgba(255,255,255,.8)" stroke-width="2"/>
          <line x1="29" y1="30" x2="35" y2="30" stroke="rgba(255,255,255,.8)" stroke-width="2"/>
        </svg>
        <div style="font-size:1.5rem;font-weight:700;letter-spacing:-.5px;">CorLink</div>
        <div style="font-size:.875rem;opacity:.7;margin-top:4px;">Loading…</div>
      </div>
    </div>
  </div>

  <!-- ─── Supabase JS ─────────────────────────────────────── -->
  <!-- Version pinned (not @2) to skip jsDelivr's version-resolution
       round-trip on first visit — that extra lookup was what made the
       page appear stuck on the loading splash until the browser cached it. -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.0/dist/umd/supabase.min.js" defer></script>

  <!-- ─── CorLink scripts (load order matters; defer preserves order) ── -->
  <script src="js/config.js?v=20260709" defer></script>
  <script src="js/supabase-client.js?v=20260709" defer></script>
  <script src="js/auth.js?v=20260714" defer></script>
  <script src="js/router.js?v=20260709" defer></script>

  <!-- Lib — light/dark theme toggle. Self-initializes on load (sets
       data-theme on <html> before the first real view renders) — see
       js/lib/theme.js for why this doesn't need a separate inline
       head script to avoid a flash of the wrong theme. -->
  <script src="js/lib/theme.js?v=20260709" defer></script>

  <!-- Lib — dependency-free rich text editor + sanitizer (no CDN; a
       library would need a build step or a script tag this static
       site has no way to verify unattended). Loaded before the data
       layer since requests-api.js/internal-requests-api.js sanitize
       bodies at write time via RichEditor.sanitize(). -->
  <script src="js/lib/rich-editor.js?v=20260709" defer></script>
  <script src="js/lib/draft-autosave.js?v=20260709" defer></script>

  <!-- Data layer -->
  <script src="js/data/admin-api.js?v=20260710" defer></script>
  <script src="js/data/notifications-api.js?v=20260709" defer></script>
  <script src="js/data/requests-api.js?v=20260714c" defer></script>
  <script src="js/data/internal-requests-api.js?v=20260714" defer></script>
  <script src="js/data/attachments-api.js?v=20260709" defer></script>
  <script src="js/data/review-comments-api.js?v=20260709" defer></script>
  <script src="js/data/cc-recipients-api.js?v=20260709" defer></script>
  <script src="js/data/prisoner-letters-api.js?v=20260709" defer></script>
  <script src="js/data/entry-api.js?v=20260710" defer></script>

  <!-- Views -->
  <script src="js/views/shell.js?v=20260714" defer></script>
  <script src="js/views/login.js?v=20260709" defer></script>
  <script src="js/views/change-password.js?v=20260709" defer></script>
  <script src="js/views/dashboard.js?v=20260715" defer></script>
  <script src="js/views/admin.js?v=20260713" defer></script>
  <script src="js/views/requests.js?v=20260715" defer></script>
  <script src="js/views/request-detail.js?v=20260715" defer></script>
  <script src="js/views/prisoner-letters.js?v=20260709" defer></script>
  <script src="js/views/prisoner-letter-detail.js?v=20260709" defer></script>
  <script src="js/views/entry.js?v=20260710" defer></script>
  <script src="js/views/entry-detail.js?v=20260710" defer></script>

  <!-- Boot -->
  <script src="js/app.js?v=20260714" defer></script>
</body>
</html>
