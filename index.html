<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="CorLink — Correctional Liaison &amp; Correspondence System. Secure, structured, accountable communications for the Maldives Correctional Service." />

  <title>CorLink — Secure. Structured. Accountable.</title>

  <!-- Content Security Policy — GitHub Pages serves static files only and
       cannot set HTTP headers, so this meta tag is the enforcement point.
       Restricts script/style/connect sources to only what CorLink needs:
       self, Google Fonts, jsDelivr (Supabase JS + Tabler Icons), and the
       Supabase project itself (REST + Realtime WebSocket). -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' https://cdn.jsdelivr.net;
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net;
    font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net;
    img-src 'self' data: https:;
    connect-src 'self' https://*.supabase.co wss://*.supabase.co;
    object-src 'none';
    base-uri 'self';
    frame-ancestors 'none';
  " />

  <!-- Favicon (official CorLink logo) -->
  <link rel="icon" type="image/jpeg" href="assets/logo.jpg" />

  <!-- Inter font (Google Fonts) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Tabler Icons — version pinned to avoid a jsDelivr resolution
       round-trip on every cold visit (which showed as a stuck loading
       screen on first load until the browser cached the redirect). -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.44.0/dist/tabler-icons.min.css" />

  <!-- CorLink styles -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- SPA container — all views are rendered here by JavaScript -->
  <div id="app" role="main">
    <!-- Loading state shown until JS boots -->
    <div style="
      min-height:100vh; display:flex; align-items:center; justify-content:center;
      background:linear-gradient(135deg,#1A7A6E,#3B82F6);
    ">
      <div style="text-align:center; color:rgba(255,255,255,.85);">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"
          width="56" height="56" style="margin:0 auto 16px;">
          <path d="M32 4L8 14v18c0 14 10.5 24.5 24 28 13.5-3.5 24-14 24-28V14L32 4z"
            fill="rgba(255,255,255,.15)" stroke="rgba(255,255,255,.7)" stroke-width="2"/>
          <circle cx="24" cy="30" r="5" fill="none" stroke="rgba(255,255,255,.8)" stroke-width="2"/>
          <circle cx="40" cy="30" r="5" fill="none" stroke="rgba(255,255,255,.8)" stroke-width="2"/>
          <line x1="29" y1="30" x2="35" y2="30" stroke="rgba(255,255,255,.8)" stroke-width="2"/>
        </svg>
        <div style="font-size:1.5rem;font-weight:700;letter-spacing:-.5px;">CorLink</div>
        <div style="font-size:.875rem;opacity:.7;margin-top:4px;">Loading…</div>
      </div>
    </div>
  </div>

  <!-- ─── Supabase JS ─────────────────────────────────────── -->
  <!-- Version pinned (not @2) to skip jsDelivr's version-resolution
       round-trip on first visit — that extra lookup was what made the
       page appear stuck on the loading splash until the browser cached it. -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.0/dist/umd/supabase.min.js" defer></script>

  <!-- ─── CorLink scripts (load order matters; defer preserves order) ── -->
  <script src="js/config.js" defer></script>
  <script src="js/supabase-client.js" defer></script>
  <script src="js/auth.js" defer></script>
  <script src="js/router.js" defer></script>

  <!-- Lib — light/dark theme toggle. Self-initializes on load (sets
       data-theme on <html> before the first real view renders) — see
       js/lib/theme.js for why this doesn't need a separate inline
       head script to avoid a flash of the wrong theme. -->
  <script src="js/lib/theme.js" defer></script>

  <!-- Lib — dependency-free rich text editor + sanitizer (no CDN; a
       library would need a build step or a script tag this static
       site has no way to verify unattended). Loaded before the data
       layer since requests-api.js/internal-requests-api.js sanitize
       bodies at write time via RichEditor.sanitize(). -->
  <script src="js/lib/rich-editor.js" defer></script>

  <!-- Data layer -->
  <script src="js/data/admin-api.js" defer></script>
  <script src="js/data/notifications-api.js" defer></script>
  <script src="js/data/requests-api.js" defer></script>
  <script src="js/data/internal-requests-api.js" defer></script>
  <script src="js/data/attachments-api.js" defer></script>
  <script src="js/data/prisoner-letters-api.js" defer></script>

  <!-- Views -->
  <script src="js/views/shell.js" defer></script>
  <script src="js/views/login.js" defer></script>
  <script src="js/views/change-password.js" defer></script>
  <script src="js/views/dashboard.js" defer></script>
  <script src="js/views/admin.js" defer></script>
  <script src="js/views/requests.js" defer></script>
  <script src="js/views/request-detail.js" defer></script>
  <script src="js/views/prisoner-letters.js" defer></script>
  <script src="js/views/prisoner-letter-detail.js" defer></script>

  <!-- Boot -->
  <script src="js/app.js" defer></script>
</body>
</html>
