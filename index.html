<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="CorLink — Correctional Liaison &amp; Correspondence System. Secure, structured, accountable communications for the Maldives Correctional Service." />

  <title>CorLink — Secure. Structured. Accountable.</title>

  <!-- Favicon (inline SVG shield) -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><path d='M32 4L8 14v18c0 14 10.5 24.5 24 28 13.5-3.5 24-14 24-28V14L32 4z' fill='%231A7A6E'/></svg>" />

  <!-- Inter font (Google Fonts) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Tabler Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />

  <!-- CorLink styles -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- SPA container — all views are rendered here by JavaScript -->
  <div id="app" role="main">
    <!-- Loading state shown until JS boots -->
    <div style="
      min-height:100vh; display:flex; align-items:center; justify-content:center;
      background:linear-gradient(135deg,#1A7A6E,#1D4E89);
    ">
      <div style="text-align:center; color:rgba(255,255,255,.85);">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"
          width="56" height="56" style="margin:0 auto 16px;">
          <path d="M32 4L8 14v18c0 14 10.5 24.5 24 28 13.5-3.5 24-14 24-28V14L32 4z"
            fill="rgba(255,255,255,.15)" stroke="rgba(255,255,255,.7)" stroke-width="2"/>
          <circle cx="24" cy="30" r="5" fill="none" stroke="rgba(255,255,255,.8)" stroke-width="2"/>
          <circle cx="40" cy="30" r="5" fill="none" stroke="rgba(255,255,255,.8)" stroke-width="2"/>
          <line x1="29" y1="30" x2="35" y2="30" stroke="rgba(255,255,255,.8)" stroke-width="2"/>
        </svg>
        <div style="font-size:1.5rem;font-weight:700;letter-spacing:-.5px;">CorLink</div>
        <div style="font-size:.875rem;opacity:.7;margin-top:4px;">Loading…</div>
      </div>
    </div>
  </div>

  <!-- ─── Supabase JS ─────────────────────────────────────── -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <!-- ─── CorLink scripts (load order matters) ───────────── -->
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/router.js"></script>

  <!-- Views -->
  <script src="js/views/login.js"></script>
  <script src="js/views/change-password.js"></script>
  <script src="js/views/dashboard.js"></script>

  <!-- Boot -->
  <script src="js/app.js"></script>
</body>
</html>
